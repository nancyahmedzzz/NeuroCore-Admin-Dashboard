<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings | NeuroCore Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], en: ['Plus Jakarta Sans', 'sans-serif'] } } } };
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-layout antialiased transition-colors">
    
    <!-- Sidebar -->
    <aside class="w-64 h-full sidebar flex flex-col z-50 flex-shrink-0 transition-colors">
        <div class="h-20 flex items-center px-6 border-b" style="border-color: var(--navbar-border);">
            <div class="w-10 h-10 card-icon rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="brain" class="w-6 h-6"></i>
            </div>
            <span class="ml-4 font-bold text-xl tracking-tight" style="color: var(--sidebar-text);">NeuroCore</span>
        </div>
        
        <nav class="flex-1 py-8 px-4 overflow-y-auto space-y-2">
            <p class="px-4 text-xs font-bold uppercase tracking-wider mb-2" style="color: rgba(255,255,255,0.4)">Main Menu</p>
            
            <a href="index.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="activity" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Overview</span>
            </a>
            <a href="analytics.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="bar-chart-2" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Clinical Analytics</span>
            </a>
            <a href="patients.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="users" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Patients</span>
                <span class="ml-auto bg-[var(--btn-primary)] text-white py-0.5 px-2 rounded-full text-[10px] font-bold">30</span>
            </a>
            <a href="settings.html" class="sidebar-link active flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Settings</span>
            </a>
        </nav>

        <div class="p-6 border-t" style="border-color: var(--navbar-border);">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Nancy+Ahmed&background=1E88E5&color=fff&rounded=true" class="w-10 h-10 rounded-full object-cover group-hover:scale-105 transition-transform" alt="Nancy Ahmed">
                <div>
                    <h4 class="text-sm font-bold" style="color: var(--sidebar-text);">Dr. Nancy Ahmed</h4>
                    <p class="text-[11px] font-bold uppercase" style="color: rgba(255,255,255,0.5)">Head of Neurosurgery</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col relative w-full h-full transition-colors overflow-hidden bg-transparent">
        
        <!-- Header -->
        <header class="h-20 navbar flex items-center justify-between px-8 z-10 sticky top-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden w-10 h-10 rounded-xl flex items-center justify-center bg-[var(--bg-main)] border border-[var(--card-border)] text-main hover:-translate-y-1 shadow-sm transition-all focus:outline-none">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex items-center gap-4">
            </div>
        </header>

        <main class="flex-1 overflow-y-auto w-full p-8 relative">
            <div class="gradient-bg-element"></div>
            
            <div class="page-content" style="opacity: 1; animation: none;">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-main">System Settings</h1>
                        <p class="text-sm text-sec mt-1 font-medium">Manage hospital profile preferences and notifications.</p>
                    </div>

                    <div class="premium-card p-8">
                        <div class="flex flex-col md:flex-row gap-8 items-start">
                            <div class="relative group cursor-pointer shrink-0">
                                <img src="https://ui-avatars.com/api/?name=Nancy+Ahmed&background=1E88E5&color=fff&rounded=true" class="w-24 h-24 rounded-2xl object-cover border-4 border-white shadow-md group-hover:scale-105 transition-transform" alt="Avatar">
                            </div>
                            <div class="flex-1 w-full space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-sec">First Name</label>
                                        <input type="text" value="Dr. Nancy" class="w-full bg-[var(--bg-cards)] border border-[var(--card-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 text-main font-bold shadow-inner" style="--tw-ring-color: var(--btn-primary);">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-sec">Last Name</label>
                                        <input type="text" value="Ahmed" class="w-full bg-[var(--bg-cards)] border border-[var(--card-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 text-main font-bold shadow-inner" style="--tw-ring-color: var(--btn-primary);">
                                    </div>
                                    <div class="space-y-2 md:col-span-2">
                                        <label class="text-sm font-bold text-sec">Hospital Email</label>
                                        <input type="email" value="dr.nancy@neurocore.med" class="w-full bg-[var(--bg-cards)] border border-[var(--card-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 text-main font-bold shadow-inner" dir="ltr" style="--tw-ring-color: var(--btn-primary);">
                                    </div>
                                </div>
                                <div class="pt-4 flex justify-end">
                                    <button class="btn-primary px-8 py-3 rounded-xl font-bold text-sm hover:-translate-y-1 transition-transform shadow-md">
                                        Save Changes
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
