<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Analytics | NeuroCore Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], en: ['Plus Jakarta Sans', 'sans-serif'] } } } };
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-layout antialiased transition-colors">
    
    <!-- Sidebar -->
    <aside class="w-64 h-full sidebar flex flex-col z-50 flex-shrink-0 transition-colors">
        <div class="h-20 flex items-center px-6 border-b" style="border-color: var(--navbar-border);">
            <div class="w-10 h-10 card-icon rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="brain" class="w-6 h-6"></i>
            </div>
            <span class="ml-4 font-bold text-xl tracking-tight" style="color: var(--sidebar-text);">NeuroCore</span>
        </div>
        
        <nav class="flex-1 py-8 px-4 overflow-y-auto space-y-2">
            <p class="px-4 text-xs font-bold uppercase tracking-wider mb-2" style="color: rgba(255,255,255,0.4)">Main Menu</p>
            
            <a href="index.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="activity" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Overview</span>
            </a>
            <a href="analytics.html" class="sidebar-link active flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="bar-chart-2" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Clinical Analytics</span>
            </a>
            <a href="patients.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="users" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Patients</span>
                <span class="ml-auto bg-[var(--btn-primary)] text-white py-0.5 px-2 rounded-full text-[10px] font-bold">30</span>
            </a>
            <a href="settings.html" class="sidebar-link flex items-center px-4 py-3 rounded-xl group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="ml-4 text-sm font-semibold">Settings</span>
            </a>
        </nav>

        <div class="p-6 border-t" style="border-color: var(--navbar-border);">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Nancy+Ahmed&background=1E88E5&color=fff&rounded=true" class="w-10 h-10 rounded-full object-cover group-hover:scale-105 transition-transform" alt="Nancy Ahmed">
                <div>
                    <h4 class="text-sm font-bold" style="color: var(--sidebar-text);">Dr. Nancy Ahmed</h4>
                    <p class="text-[11px] font-bold uppercase" style="color: rgba(255,255,255,0.5)">Head of Neurosurgery</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col relative w-full h-full transition-colors overflow-hidden bg-transparent">
        
        <!-- Header -->
        <header class="h-20 navbar flex items-center justify-between px-8 z-10 sticky top-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden w-10 h-10 rounded-xl flex items-center justify-center bg-[var(--bg-main)] border border-[var(--card-border)] text-main hover:-translate-y-1 shadow-sm transition-all focus:outline-none">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="relative w-96 hidden md:block group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-sec"></i>
                    <input type="text" placeholder="Search analytics metrics..." class="w-full bg-[var(--bg-main)] border border-[var(--card-border)] rounded-full pl-12 pr-4 py-2.5 text-sm focus:outline-none focus:ring-1 transition-all text-main shadow-sm focus:shadow-md" style="--tw-ring-color: var(--btn-primary);">
                </div>
            </div>
            
            <div class="flex items-center gap-4">
            </div>
        </header>

        <main class="flex-1 overflow-y-auto w-full p-8 relative">
            <div class="gradient-bg-element"></div>
            
            <div class="page-content" style="opacity: 1; animation: none;">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-main">Clinical Analytics</h1>
                        <p class="text-sm text-sec mt-1 font-medium">Deep-dive into hospital operational metrics and surgical distribution.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="premium-card p-6 h-[400px] flex flex-col">
                        <div class="mb-4">
                            <h2 class="text-lg font-bold text-main">Procedure Distribution</h2>
                            <p class="text-xs text-sec mt-1">Breakdown of closed surgical events</p>
                        </div>
                        <div class="flex-1 relative w-full flex items-center justify-center">
                            <canvas id="categoryPie"></canvas>
                        </div>
                    </div>

                    <div class="premium-card p-6 h-[400px] flex flex-col">
                        <div class="mb-4">
                            <h2 class="text-lg font-bold text-main">Admissions vs. Discharges</h2>
                        </div>
                        <div class="flex-1 relative w-full">
                            <canvas id="monthlyBar"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
